# DirDetective 内置规则（v0.1）
# 常见 macOS 隐藏目录的归属与可删性判定

- name: "Documents"
  owner: "用户"
  category: "private"
  kind: "private"
  purpose: "你的个人文档目录，本工具不分析其中内容。"
  delete_effect: "这是个人文件夹，不应由 DirDetective 给出清理建议。"
  deletable: "never"

- name: "Desktop"
  owner: "用户"
  category: "private"
  kind: "private"
  purpose: "你的桌面目录，本工具不分析其中内容。"
  delete_effect: "这是个人文件夹，不应由 DirDetective 给出清理建议。"
  deletable: "never"

- name: "Downloads"
  owner: "用户"
  category: "private"
  kind: "private"
  purpose: "你的下载目录，本工具不分析其中内容。"
  delete_effect: "这是个人文件夹，不应由 DirDetective 给出清理建议。"
  deletable: "never"

- name: "Pictures"
  owner: "用户"
  category: "private"
  kind: "private"
  purpose: "你的图片目录，本工具不分析其中内容。"
  delete_effect: "这是个人文件夹，不应由 DirDetective 给出清理建议。"
  deletable: "never"

- name: "Movies"
  owner: "用户"
  category: "private"
  kind: "private"
  purpose: "你的影片目录，本工具不分析其中内容。"
  delete_effect: "这是个人文件夹，不应由 DirDetective 给出清理建议。"
  deletable: "never"

- name: "Music"
  owner: "用户"
  category: "private"
  kind: "private"
  purpose: "你的音乐目录，本工具不分析其中内容。"
  delete_effect: "这是个人文件夹，不应由 DirDetective 给出清理建议。"
  deletable: "never"

- name: ".DS_Store"
  owner: "macOS Finder"
  category: "known"
  kind: "metadata"
  purpose: "macOS 用来保存文件夹显示方式和图标位置的元数据文件。"
  delete_effect: "删除后 Finder 会在需要时重新生成，文件夹显示设置可能重置。"
  deletable: "safe"

- name: ".dat.nosync*"
  owner: "macOS / 应用临时数据"
  category: "known"
  kind: "temporary"
  purpose: "标记为不参与同步的应用临时数据。"
  delete_effect: "可能被应用重新生成；正在使用时删除可能导致当前任务重建数据。"
  deletable: "caution"

- name: "uuid-temp"
  owner: "应用临时数据"
  category: "known"
  kind: "temporary"
  purpose: "使用 UUID 命名的临时工作目录或文件。"
  delete_effect: "通常可重新生成，但仅凭名称无法确认是否仍被应用使用。"
  deletable: "caution"

- name: "flutter_engine"
  owner: "Flutter"
  category: "known"
  kind: "cache"
  purpose: "Flutter 引擎或构建工具生成的缓存数据。"
  delete_effect: "删除后相关 Flutter 工具会在下次构建时重新下载或生成。"
  deletable: "safe"

- name: "gradle-caches"
  owner: "Gradle"
  category: "known"
  kind: "cache"
  purpose: "Gradle 下载的依赖和构建缓存。"
  delete_effect: "删除后 Gradle 会在下次构建时重新下载依赖并重建缓存。"
  deletable: "safe"
  path_contains: [".gradle/caches"]

- name: ".augmentcode"
  owner: "Augment Code"
  kind: "plugin-data"
  purpose: "AI 编程插件的账号与索引数据"
  deletable: "caution"
  deletable_if_uninstalled: "safe"
  match_keywords: ["augment", "augmentcode"]
  platforms: ["macos", "windows"]

